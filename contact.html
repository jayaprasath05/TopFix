<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TopFix - Contact Page</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

    body {
      font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 0;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: url('contact/contact b3.jpg');
      background-size: cover;
      background-position: center;
      filter: brightness(0.7) contrast(1.1);
      z-index: -1;
      pointer-events: none;
    }

    header {
      background: #fff;
      color: #000;
      padding: 8px 20px;
      font-size: 12px;
      border-bottom: 1px solid #ccc;
      text-align: center;
    }

    .header-title {
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      margin-top: 10px;
      color: #000;
    }

    .main-nav {
      background-color: #000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      flex-wrap: wrap;
    }

    .logo {
      display: flex;
      align-items: center;
      text-decoration: none;
    }
    .logo img {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center;
      margin-right: 10px;
      background: white;
    }
    .logo label {
      color: #fff;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
    }

    .nav-links > ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
    }

    .nav-links > ul > li {
      margin: 0 15px;
    }

    .nav-links > ul > li > a {
      color: white;
      text-decoration: none;
      font-size: 16px;
      font-weight: bold;
    }

    .nav-links > ul > li > a:hover {
      color: #f0c14b;
    }

    /* Dropdown container */
    .dropdown {
      position: relative;
    }

    /* Dropdown Menu */
    .dropdown-menu {
      display: none;
      position: absolute;
      background-color: #000;
      min-width: 160px;
      box-shadow: 0px 8px 16px rgba(0,0,0,0.3);
      z-index: 1000;
      list-style: none;
      padding: 0;
      margin: 0;
      border: 1px solid #f0c14b;
      border-radius: 4px;
      top: 100%;
      left: 0;
    }

    .dropdown-menu li {
      margin: 0 !important;
      border-bottom: 1px solid #222;
    }

    .dropdown-menu li:last-child {
      border-bottom: none;
    }

    .dropdown-menu li a {
      color: #fff !important;
      padding: 10px 16px;
      text-decoration: none;
      display: block;
      font-size: 14px !important;
      font-weight: bold !important;
      text-shadow: none !important;
      transition: background-color 0.2s, color 0.2s;
    }

    .dropdown-menu li a:hover {
      background-color: #f0c14b;
      color: #000 !important;
    }

    .dropdown:hover .dropdown-menu {
      display: block;
    }

    .arrow {
      font-size: 10px;
      margin-left: 4px;
      display: inline-block;
      vertical-align: middle;
      transition: transform 0.2s;
    }

    .dropdown:hover .arrow {
      transform: rotate(180deg);
    }

    .login-button {
      padding: 10px 25px;
      border-radius: 20px;
      background: linear-gradient(90deg, #f0c14b 60%, #fffbe6 100%);
      border: 1.5px solid #f0c14b;
      cursor: pointer;
      font-weight: bold;
      text-decoration: none;
      color: #222;
      font-size: 16px;
      box-shadow: 0 2px 8px #f0c14b44;
      transition: background 0.2s, color 0.2s;
    }
    .login-button:hover {
      background: #fffbe6;
      color: #b38b00;
    }

    /* Glassmorphism form container */
    .form-container {
      max-width: 420px;
      width: 90%;
      margin: 60px auto;
      padding: 35px 30px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      box-sizing: border-box;
      animation: fadeInUp 0.4s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .form-container h2 {
      text-align: center;
      font-size: 24px;
      font-weight: 600;
      color: #111;
      margin-bottom: 24px;
      position: relative;
    }

    .form-container h2::after {
      content: "";
      display: block;
      width: 40px;
      height: 3px;
      background: #f0c14b;
      margin: 8px auto 0 auto;
      border-radius: 2px;
    }

    .form-container form label {
      display: block;
      margin-top: 14px;
      font-weight: 500;
      font-size: 13px;
      color: #333;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-container form input,
    .form-container form select,
    .form-container form textarea {
      width: 100%;
      padding: 10px 14px;
      margin-top: 6px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      background-color: #fff;
      box-sizing: border-box;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .form-container form input:focus,
    .form-container form select:focus,
    .form-container form textarea:focus {
      border-color: #f0c14b;
      outline: none;
      box-shadow: 0 0 0 3px rgba(240, 193, 75, 0.15);
      background-color: #fff;
    }

    .form-container form input[type="submit"] {
      margin-top: 24px;
      background: linear-gradient(135deg, #f0c14b 0%, #eebe45 100%);
      color: #111;
      border: none;
      padding: 12px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(240, 193, 75, 0.35);
      transition: all 0.2s ease;
    }

    .form-container form input[type="submit"]:hover {
      background: #ffd814;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(240, 193, 75, 0.45);
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #333;
      color: #fff;
      margin-top: auto;
    }
  </style>
  <link rel="icon" type="image/x-icon" href="homepage/logo1.webp">
</head>
<body>

  <header>
    <div class="header-title">
      Laptop & Desktop Service Company
    </div>
  </header>

  <nav class="main-nav">
    <a href="homepage.html" class="logo">
      <img src="homepage/logo1.webp" alt="Logo">
      <label>TopFix</label>
    </a>
    <div class="nav-links">
      <ul>
        <li><a href="homepage.html">Home</a></li>
        <li><a href="service.html">Service</a></li>
        <li class="dropdown">
          <a href="product.html">Products <span class="arrow">&#9662;</span></a>
          <ul class="dropdown-menu">
            <li><a href="product.html#laptops">Laptops</a></li>
            <li><a href="product.html#pcs">PCs</a></li>
            <li><a href="product.html#mobiles">Mobiles</a></li>
            <li><a href="product.html#accessories">Accessories</a></li>
          </ul>
        </li>
        <li><a href="sell(1).html">Sales</a></li>
        <li><a href="location.html">Location</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
    <a href="login1.html" class="login-button">Login</a>  
  </nav>

  <div class="form-container">
    <h2>Fill the details</h2>
    <form id="contactForm">
      <label for="name">Name :</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email :</label>
      <input type="email" id="email" name="email" required>

      <label for="stateSelect">STATE :</label>
      <select name="state" id="stateSelect" required>
        <option value="">select</option>
        <option value="TAMIL NADU">TAMIL NADU</option>
        <option value="Andhra Pradesh">Andhra Pradesh</option>
        <option value="Arunachal Pradesh">Arunachal Pradesh</option>
        <option value="Assam">Assam</option>
        <option value="Kerala">Kerala</option>
        <option value="Punjab">Punjab</option>
        <option value="Rajasthan">Rajasthan</option>
      </select>

      <label for="citySelect">City :</label>
      <select name="City" id="citySelect" required>
        <option value="">select</option>
      </select>

      <label for="address">Address :</label>
      <textarea id="address" name="address" rows="2" required></textarea>

      <label for="phone">Phone :</label>
      <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" required>

      <input type="submit" value="Submit">

      <p style="text-align:center; margin-top:15px; font-size:13px;">Our team will reach you out very soon!!</p>
    </form>
  </div>

  <script>
    const citiesByState = {
        "TAMIL NADU": ["Chennai", "Coimbatore", "Madurai", "Tiruchirappalli (Trichy)", "Salem", "Tirunelveli", "Erode", "Vellore"],
        "Andhra Pradesh": ["Visakhapatnam", "Vijayawada", "Guntur", "Nellore", "Tirupati", "Kurnool"],
        "Arunachal Pradesh": ["Itanagar", "Naharlagun", "Pasighat", "Tawang"],
        "Assam": ["Guwahati", "Dibrugarh", "Silchar", "Jorhat", "Tezpur"],
        "Kerala": ["Kochi", "Thiruvananthapuram", "Kozhikode", "Thrissur", "Alappuzha", "Kollam"],
        "Punjab": ["Ludhiana", "Amritsar", "Jalandhar", "Patiala", "Bathinda"],
        "Rajasthan": ["Jaipur", "Jodhpur", "Udaipur", "Kota", "Ajmer", "Bikaner"]
    };

    const stateSelect = document.getElementById('stateSelect');
    const citySelect = document.getElementById('citySelect');
    const contactForm = document.getElementById('contactForm');
    const container = document.querySelector('.form-container');

    stateSelect.addEventListener('change', function() {
        const selectedState = this.value;
        citySelect.innerHTML = '<option value="">select</option>';
        
        if (selectedState && citiesByState[selectedState]) {
            citiesByState[selectedState].forEach(city => {
                const opt = document.createElement('option');
                opt.value = city;
                opt.textContent = city;
                citySelect.appendChild(opt);
            });
        }
    });

    contactForm.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const name = contactForm.elements['name'].value;
        const email = contactForm.elements['email'].value;
        const state = contactForm.elements['state'].value;
        const city = contactForm.elements['City'].value;
        const address = contactForm.elements['address'].value;
        const phone = contactForm.elements['phone'].value;
        
        container.innerHTML = `
            <div style="text-align: center; padding: 10px 5px;">
                <div style="font-size: 45px; color: #28a745; margin-bottom: 12px;">✔</div>
                <h2 style="color: #28a745; margin-bottom: 8px; font-size: 20px;">Details Submitted!</h2>
                <p style="font-size: 13px; color: #555; margin-bottom: 18px;">Thank you, <strong>${name}</strong>. Our team will contact you very soon!</p>
                
                <div style="text-align: left; background: #f8f9fa; border: 1px solid #ddd; border-radius: 6px; padding: 12px; font-size: 13px; line-height: 1.6; color: #333; margin-bottom: 18px;">
                    <strong style="font-size:14px; display:block; margin-bottom:6px; border-bottom:1px solid #eee; padding-bottom:4px;">Request Summary:</strong>
                    • <strong>Email:</strong> ${email}<br>
                    • <strong>Phone:</strong> ${phone}<br>
                    • <strong>Location:</strong> ${city}, ${state}<br>
                    • <strong>Address:</strong> ${address}
                </div>
                
                <button onclick="window.location.reload()" style="background: linear-gradient(90deg, #f0c14b 60%, #fffbe6 100%); color: #222; border: 1px solid #f0c14b; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: bold; width: 100%; transition: opacity 0.2s; box-shadow: 0 2px 8px #f0c14b44;">Send Another Request</button>
            </div>
        `;
    });
  </script>

  <footer>
    <p>&copy; TopFix 2025. All Rights Reserved.</p>
  </footer>

</body>
</html>
