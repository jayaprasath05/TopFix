<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TopFix - Contact Page</title>
  
  <link rel="icon" type="image/x-icon" href="homepage/logo1.webp">
  <link rel="stylesheet" href="contact.css">
</head>
<body>

  <header>
    <div class="header-title">
      Laptop & Desktop Service Company
    </div>
  </header>

  <nav class="main-nav">
    <a href="homepage.html" class="logo">
      <img src="homepage/logo1.webp" alt="Logo">
      <label>TopFix</label>
    </a>
    <div class="nav-links">
      <ul>
        <li><a href="homepage.html">Home</a></li>
        <li><a href="service.html">Service</a></li>
        <li class="dropdown">
          <a href="product.html">Products <span class="arrow">&#9662;</span></a>
          <ul class="dropdown-menu">
            <li><a href="product.html#laptops">Laptops</a></li>
            <li><a href="product.html#pcs">PCs</a></li>
            <li><a href="product.html#mobiles">Mobiles</a></li>
            <li><a href="product.html#accessories">Accessories</a></li>
          </ul>
        </li>
        <li><a href="sell(1).html">Sales</a></li>
        <li><a href="location.html">Location</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
    <a href="login1.html" class="login-button">Login</a>  
  </nav>

  <div class="form-container">
    <h2>Fill the details</h2>
    <form id="contactForm">
      <label for="name">Name :</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email :</label>
      <input type="email" id="email" name="email" required>

      <label for="stateSelect">STATE :</label>
      <select name="state" id="stateSelect" required>
        <option value="">select</option>
        <option value="TAMIL NADU">TAMIL NADU</option>
        <option value="Andhra Pradesh">Andhra Pradesh</option>
        <option value="Arunachal Pradesh">Arunachal Pradesh</option>
        <option value="Assam">Assam</option>
        <option value="Kerala">Kerala</option>
        <option value="Punjab">Punjab</option>
        <option value="Rajasthan">Rajasthan</option>
      </select>

      <label for="citySelect">City :</label>
      <select name="City" id="citySelect" required>
        <option value="">select</option>
      </select>

      <label for="address">Address :</label>
      <textarea id="address" name="address" rows="2" required></textarea>

      <label for="phone">Phone :</label>
      <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" required>

      <input type="submit" value="Submit">

      <p style="text-align:center; margin-top:15px; font-size:13px;">Our team will reach you out very soon!!</p>
    </form>
  </div>

  

  <footer>
    <p>&copy; TopFix 2025. All Rights Reserved.</p>
  </footer>

  <script src="contact.js"></script>
</body>
</html>
