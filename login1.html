<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TopFix - Sign-In Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
  <link rel="icon" type="image/x-icon" href="homepage/logo1.webp">
  <link rel="stylesheet" href="login1.css">
</head>
<body>
    <header>
        <div class="header-title">
            Laptop & Desktop Service Company
        </div>
    </header>

    <nav class="main-nav">
        <a href="homepage.html" class="logo">
      <img src="homepage/logo1.webp" alt="Logo">
      <label>TopFix</label>
    </a>
        <div class="nav-links">
            <ul>
                <li><a href="homepage.html">Home</a></li>
                <li><a href="service.html">Service</a></li>
                <li><a href="product.html">Products</a></li>
                <li><a href="sell(1).html">Sales</a></li>
                <li><a href="location.html">Location</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    <a href="login1.html" class="login-button">Login</a>
    </nav>

    <div class="container">
        <img src="homepage/logo1.webp" alt="Logo" class="logo1">
        <h1 id="pageTitle">Sign-In</h1>
        <form id="authForm">
            <div id="nameField" style="display: none;">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" placeholder="First and last name">
            </div>

            <label for="email">Email or mobile phone number</label>
            <input type="email" id="email" name="email" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>

            <div id="confirmPasswordField" style="display: none;">
                <label for="confirmPassword">Password again</label>
                <input type="password" id="confirmPassword" name="confirmPassword">
            </div>

            <button type="submit" id="submitBtn" class="signin-btn">Sign-In</button>
        </form>
        <a href="#" class="help">Forgot your password?</a>
        <div class="divider"><span id="toggleText">New to laptop service?</span></div>
        <button type="button" class="create-account-btn" id="toggleModeBtn">Create your laptop service account</button>
    </div>

    
    <div class="footer">
        &copy; 2024, laptop service Clone. For demonstration purposes only.
    </div>
  <script src="login1.js"></script>
</body>
</html>
